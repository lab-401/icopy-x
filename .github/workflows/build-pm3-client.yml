name: Build PM3 Client (ARM)

on:
  workflow_dispatch:
    inputs:
      pm3_tag:
        description: 'PM3 release tag (leave empty for latest)'
        required: false
        default: ''

jobs:
  build:
    name: Cross-compile PM3 Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve PM3 tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.pm3_tag }}"
          if [ -z "$TAG" ]; then
            TAG=$(git ls-remote --tags https://github.com/RfidResearchGroup/proxmark3.git "v4.*" \
              | grep -v '\^{}' | sed 's|.*refs/tags/||' \
              | sort -t. -k1,1 -k2,2n | tail -1)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building PM3 client from: $TAG"

      - name: Cross-compile in xenial container (glibc 2.23 target)
        env:
          PM3_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # The iCopy-X runs Ubuntu 16.04 (glibc 2.23). Build inside a xenial
          # container with xenial's GCC 5.4 cross-compiler + sed fixups for
          # C11 constructs that GCC 5.4 doesn't support.
          mkdir -p /tmp/pm3-out

          docker run --rm \
            -v /tmp/pm3-out:/out \
            -v ${{ github.workspace }}/tools/patches:/patches:ro \
            ubuntu:16.04 bash -c '
            set -e

            cat > /etc/apt/sources.list << SRCEOF
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ xenial main restricted universe
          deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ xenial-updates main restricted universe
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports/ xenial main restricted universe
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports/ xenial-updates main restricted universe
          SRCEOF

            dpkg --add-architecture armhf
            apt-get update -qq
            apt-get install -y -qq \
              gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
              make pkg-config git zip \
              libbz2-dev:armhf zlib1g-dev:armhf liblz4-dev:armhf

            echo "GCC: $(arm-linux-gnueabihf-gcc --version | head -1)"

            git clone --depth 1 --branch '"$PM3_TAG"' https://github.com/RfidResearchGroup/proxmark3.git /tmp/pm3
            cd /tmp/pm3

            echo "Applying iCopy-X patches..."
            for p in /patches/pm3_*.patch; do
              [ -f "$p" ] || continue
              if git apply --check "$p" 2>/dev/null; then
                git apply "$p" && echo "  Applied: $(basename $p)"
              else
                echo "  Skipped: $(basename $p)"
              fi
            done

            # GCC 5.4 compat fixups (these constructs were added in newer PM3 releases)
            # 1. Remove -fstack-clash-protection (requires GCC 8+)
            sed -i "s/-fstack-clash-protection//g" Makefile.defs client/Makefile 2>/dev/null || true
            # 2. Non-constant static initializer in cmdhfaliro.c
            sed -i "s/static const uint8_t protocol_marker\[\]/const uint8_t protocol_marker[]/" client/src/cmdhfaliro.c 2>/dev/null || true
            # 3. Enum case labels in cmdhfvas.c — replace enum refs with literal values
            if [ -f client/src/cmdhfvas.c ] && grep -q "case VAS_STATUS" client/src/cmdhfvas.c; then
              # Extract enum values and inline them
              for sym in $(grep -oP "case \KVAS_STATUS_\w+" client/src/cmdhfvas.c | sort -u); do
                val=$(grep -rP "^\s*${sym}\s*=" client/src/cmdhfvas.h client/include/ 2>/dev/null | grep -oP "0x[0-9A-Fa-f]+" | head -1)
                [ -n "$val" ] && sed -i "s/case ${sym}:/case ${val}: \/\* ${sym} \*\//" client/src/cmdhfvas.c
              done
            fi
            echo "GCC 5.4 compat fixups applied"

            export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig
            export PKG_CONFIG_LIBDIR=/usr/lib/arm-linux-gnueabihf/pkgconfig

            make -j$(nproc) client \
              PLATFORM=PM3ICOPYX \
              CC=arm-linux-gnueabihf-gcc \
              CXX=arm-linux-gnueabihf-g++ \
              LD=arm-linux-gnueabihf-ld \
              "AR=arm-linux-gnueabihf-ar rcs" \
              RANLIB=arm-linux-gnueabihf-ranlib \
              cpu_arch=arm \
              SKIPQT=1 SKIPPYTHON=1 SKIPREVENGTEST=1 SKIPGD=1 SKIPBT=1 SKIPREADLINE=1

            cp client/proxmark3 /out/proxmark3
            cd client && zip -r /out/lua.zip luascripts/ lualibs/
            echo "Binary: $(file /out/proxmark3)"
            echo "GLIBC max: $(objdump -T /out/proxmark3 | grep -oP "GLIBC_\d+\.\d+" | sort -t. -k2,2n | tail -1)"
            echo "lua.zip: $(du -h /out/lua.zip | cut -f1)"
          '

          echo "${{ steps.tag.outputs.tag }}" > /tmp/pm3-out/VERSION
          file /tmp/pm3-out/proxmark3
          GLIBC_MAX=$(objdump -T /tmp/pm3-out/proxmark3 | grep -oP 'GLIBC_\d+\.\d+' | sort -t. -k2,2n | tail -1)
          echo "GLIBC max requirement: $GLIBC_MAX"
          if echo "$GLIBC_MAX" | grep -qP 'GLIBC_2\.(2[4-9]|[3-9]\d)'; then
            echo "::error::Binary requires $GLIBC_MAX but device has glibc 2.23!"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: pm3-client-arm-${{ steps.tag.outputs.tag }}
          path: /tmp/pm3-out/
          retention-days: 7
